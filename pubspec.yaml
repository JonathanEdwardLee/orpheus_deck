name: orpheus_deck
description: Junkfeathers Tech - Orpheus Deck.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  ffmpeg_kit_flutter_new: ^4.1.0
  flutter:
    sdk: flutter
  just_audio: ^0.9.46
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.2.0
  share_plus: ^13.1.0
  audio_session: ^0.1.25
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  # Padded foreground (~58% of 1024 canvas) so cassette stays inside Android adaptive safe zone.
  image_path: "assets/images/launcher_icon_adaptive_foreground.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/launcher_icon_adaptive_foreground.png"
